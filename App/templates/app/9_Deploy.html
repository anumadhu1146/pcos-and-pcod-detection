<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Assessment Form</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: url(https://w0.peakpx.com/wallpaper/213/560/HD-wallpaper-blue-neon-background-blue-waves-background-abstract-blue-backgrounds-creative-blue-abstraction.jpg) no-repeat;
            background-size: cover;
            color: #495057;
        }
        .form-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .form-container h2 {
            margin-bottom: 25px;
            font-size: 2rem;
            color: #007bff;
            text-align: center;
            font-weight: 600;
        }
        .form-group label {
            font-weight: 500;
        }
        .form-control {
            border-radius: 5px;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.075);
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
        }
        .btn-primary:hover {
            background-color: #0056b3;
            color: #ffffff;
        }
        .form-group input[type="number"],
        .form-group input[type="text"],
        .form-group select {
            border-color: #ced4da;
        }
        a.top {
  display: inline-block;
  padding: 10px 20px;
  font-size: 16px;
  text-align: center;
  text-decoration: none;
  background-color: #053777;
  color: #fff;
  border: 2px solid #fff;
  border-radius: 5px;
  transition: background-color 0.3s ease, color 0.3s ease;
}

a.top:hover {
  background-color: #000000;
  color: #ffffff;
}
    </style>
</head>
<body>
    <a href="/" class="top">Back to Home</a>

   
    <div class="container">
        <div class="form-container">
            <h2>Health Assessment Form</h2>
            <form method="post" action="{% url 'Deploy_9' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="text" class="form-control" id="Age" name="Age" required>
                </div>
                <div class="form-group">
                    <label for="weight">Weight</label>
                    <input type="text" step="0.0001" class="form-control" id="Weight" name="Weight" required>
                </div>
                <div class="form-group">
                    <label for="height">Height</label>
                    <input type="text" step="0.0001" class="form-control" id="Height" name="Height" required>
                </div>
                <div class="form-group">
                    <label for="bmi">BMI</label>
                    <input type="text" step="0.00001" class="form-control" id="BMI" name="BMI" required>
                </div>
                <div class="form-group">
                    <label for="blood_group">Blood Group</label>
                    <input type="text" class="form-control" id="Blood_Group" name="Blood_Group" required>
                </div>
                <div class="form-group">
                    <label for="pulse_rate">Pulse Rate</label>
                    <input type="text" class="form-control" id="Pulse_rate" name="Pulse_rate" required>
                </div>
                <div class="form-group">
                    <label for="rr">RR</label>
                    <input type="text" class="form-control" id="RR" name="RR" required>
                </div>
                <div class="form-group">
                    <label for="hb">Hb</label>
                    <input type="text" class="form-control" id="Hb" name="Hb" required>
                </div>
                <div class="form-group">
                    <label for="marriage_status">Marriage Status</label>
                    <input class="form-control" id="Marriage_Status" name="Marriage_Status" required>
                        
                </div>
                <div class="form-group">
                    <label for="pregnant">Pregnant</label>
                    <input class="form-control" id="Pregnant" name="Pregnant" required>
                        
                </div>
                <div class="form-group">
                    <label for="no_of_abortions">No of Abortions</label>
                    <input type="number" class="form-control" id="No_of_abortions" name="No_of_abortions" required>
                </div>
                <div class="form-group">
                    <label for="tsh">TSH</label>
                    <input type="text" step="0.1" class="form-control" id="TSH" name="TSH" required>
                </div>
                <div class="form-group">
                    <label for="prg">PRG</label>
                    <input type="text" step="0.1" class="form-control" id="PRG" name="PRG" required>
                </div>
                <div class="form-group">
                    <label for="rbs">RBS</label>
                    <input type="text" step="0.1" class="form-control" id="RBS" name="RBS" required>
                </div>
                <div class="form-group">
                    <label for="weight_gain">Weight Gain</label>
                    <input type="text" class="form-control" id="Weight_gain" name="Weight_gain" required>
                </div>
                <div class="form-group">
                    <label for="hair_loss">Hair Loss</label>
                    <input type="text" class="form-control" id="Hair_loss" name="Hair_loss" required>
                </div>
                <div class="form-group">
                    <label for="fast_food">Fast Food</label>
                    <input class="form-control" id="Fast_food" name="Fast_food" required>
                        
                </div>
                <div class="form-group">
                    <label for="reg_exercise">Regular Exercise</label>
                    <input class="form-control" id="Reg_Exercise" name="Reg_Exercise" required>
                      
                </div>
                <div class="form-group">
                    <label for="bp_systolic">BP Systolic</label>
                    <input type="text" class="form-control" id="BP_Systolic" name="BP_Systolic" required>
                </div>
                <div class="form-group">
                    <label for="bp_diastolic">BP Diastolic</label>
                    <input type="text" class="form-control" id="BP_Diastolic" name="BP_Diastolic" required>
                </div>
                <div class="form-group">
                    <label for="follicle_no_l">Follicle No L</label>
                    <input type="text" class="form-control" id="Follicle_No_L" name="Follicle_No_L" required>
                </div>
                <div class="form-group">
                    <label for="follicle_no_r">Follicle No R</label>
                    <input type="text" class="form-control" id="Follicle_No_R" name="Follicle_No_R" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
